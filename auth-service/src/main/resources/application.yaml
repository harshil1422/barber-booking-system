server:
  port: 8087
  error:
    include-message: never             # Never expose stack traces in production
    include-stacktrace: never
    include-binding-errors: never

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/barber_auth_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:test_123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile

app:
  jwt:
    secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleVRoYXRJc0F0TGVhc3QyNTZCaXRzTG9uZw==}           # 256-bit base64 key from env
    access-token-expiry: 900        # 15 min (seconds)
    refresh-token-expiry: 604800    # 7 days (seconds)
    issuer: your-app

  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:4200/oauth2/callback}

# ← THIS is the critical fix — disables Eureka entirely for auth-service
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.barberService.auth_service: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"