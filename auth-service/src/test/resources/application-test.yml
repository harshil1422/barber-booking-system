app:
  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLW9ubHktMzJieXRlcw==
    access-token-expiry: 900
    refresh-token-expiry: 604800
    issuer: test-app

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false   # Let Hibernate handle schema in tests

  data:
    redis:
      host: localhost
      port: 6370     # Use a test Redis or Testcontainers

logging:
  level:
    com.yourapp.auth: DEBUG
