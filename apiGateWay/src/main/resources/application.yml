server:
  port: 9090

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

spring:
  application:
    name: barberShopGateway

  cloud:
    gateway:
      routes:
        - id: shop-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/shop/**