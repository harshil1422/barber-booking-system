server:
  port: 9090

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

eureka:
  client:
    enable: false
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

spring:
  application:
    name: barberShopGateway



  cloud:
    gateway:




      # Global CORS — applies to ALL routes automatically
      globalcors:
        corsConfigurations:
          '[/**]':
            # NEVER use '*' with allowCredentials: true — browser blocks it
            allowedOrigins:
              - "http://localhost:4200"     # Angular dev server
              - "https://yourdomain.com"    # production URL

            allowedMethods:
              - "GET"
              - "POST"
              - "PUT"
              - "PATCH"
              - "DELETE"
              - "OPTIONS"                  # preflight method — MUST be included

            allowedHeaders:
              - "*"                          # allow all request headers

            allowCredentials: true         # required for withCredentials + cookies
            maxAge: 3600                   # browser caches preflight for 1 hour
      routes:
        - id: shop-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/shop/**
        - id: auth-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/auth/**

      # IMPORTANT: This prevents the gateway from passing its own CORS headers
      # to downstream services and getting duplicate headers in the response
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin