spring.application.name=appoimentService


spring.datasource.url=jdbc:mysql://localhost:3306/barberBookingService?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=test

# JPA properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
#spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Logging Configuration
# ===============================
logging.level.root=INFO
logging.level.com.barberService.appoimentservice=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ------------------------------
# Resilience4j Config for Slot Service
# ------------------------------
resilience4j.retry.instances.slotService.max-attempts=3
resilience4j.retry.instances.slotService.wait-duration=1s

resilience4j.timeLimiter.instances.slotService.timeout-duration=2s



server.port=8088
slot.service.url=http://localhost:8089