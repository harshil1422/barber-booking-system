<div class="auth-container">
  <mat-card class="auth-card">

    <!-- Header -->
    <mat-card-header>
      <mat-card-title class="auth-title">
        <span class="brand">✂ Barber Booking</span>
      </mat-card-title>
      <mat-card-subtitle>Sign in to your account</mat-card-subtitle>
    </mat-card-header>

    <!-- Content -->
    <mat-card-content>

      <!-- Error banner -->
      <div class="error-banner"
           *ngIf="error$ | async as error"
           role="alert">
        <mat-icon>error_outline</mat-icon>
        <span>{{ error }}</span>
      </div>

      <!-- Success banner -->
      <!-- <div class="success-banner"
           *ngIf="route.snapshot.queryParams['registered']"
           role="status">
        <mat-icon>check_circle</mat-icon>
        <span>Account created — you can now sign in.</span>
      </div> -->

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

        <!-- Username -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username or email</mat-label>

          <input
            matInput
            formControlName="username"
            autocomplete="username"
            placeholder="johndoe">

          <mat-icon matPrefix>person_outline</mat-icon>
        </mat-form-field>

        <!-- Password -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>

          <input
            matInput
            formControlName="password"
            [type]="hidePassword ? 'password' : 'text'"
            autocomplete="current-password">

          <mat-icon matPrefix>lock_outline</mat-icon>

          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hidePassword = !hidePassword"
            [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'">

            <mat-icon>
              {{ hidePassword ? 'visibility_off' : 'visibility' }}
            </mat-icon>
          </button>
        </mat-form-field>

        <!-- Submit -->
        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="submit-btn"
          [disabled]="isLoading$ | async">

          <ng-container *ngIf="isLoading$ | async; else btnText">
            <mat-spinner diameter="20"></mat-spinner>
          </ng-container>

          <ng-template #btnText>
            Sign in
          </ng-template>

        </button>

      </form>

    </mat-card-content>

    <!-- Footer -->
    <mat-card-actions class="card-footer">
      <span class="register-link">
        New here?
        <a routerLink="/auth/register" mat-button color="primary">
          Create an account
        </a>
      </span>
    </mat-card-actions>

  </mat-card>
</div>
